<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Retro CRT mark</title>
  <desc id="desc">Flat CRT icon with a composite signal trace.</desc>
  <defs>
    <style>
      :root {
        --bg: #fff8f0;
        --screen: #ffffff;
        --ink: #201827;
        --cyan: #007f91;
        --pink: #cf1b7f;
        --amber: #c46f00;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #090613;
          --screen: #151020;
          --ink: #fff4df;
          --cyan: #26d8e8;
          --pink: #ff4aa2;
          --amber: #ffd15a;
        }
      }
    </style>
  </defs>
  <rect x="12" y="18" width="72" height="52" rx="8" fill="var(--bg)" stroke="var(--ink)" stroke-width="4"/>
  <rect x="22" y="28" width="46" height="30" rx="3" fill="var(--screen)" stroke="var(--cyan)" stroke-width="3"/>
  <path d="M28 44h11l5-13 7 27 6-14h8" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-linecap="square" stroke-linejoin="round"/>
  <path d="M74 33h4M74 43h4M74 53h4" stroke="var(--pink)" stroke-width="4" stroke-linecap="square"/>
  <path d="M36 70l-8 14M60 70l8 14M27 84h42" stroke="var(--ink)" stroke-width="5" stroke-linecap="square"/>
  <rect x="12" y="18" width="8" height="52" fill="var(--pink)"/>
  <rect x="20" y="18" width="5" height="52" fill="var(--amber)" opacity=".95"/>
</svg>
