<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CRT Monitor</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <div id="tab-content">
    <!-- LIVE TAB -->
    <div class="tab-pane active" data-tab="live">
      <div class="feed-container">
        <canvas id="live-canvas"></canvas>
        <div id="feed-overlay" class="feed-overlay">NO SIGNAL</div>
        <!-- Stats overlay -->
        <div id="stats-overlay" class="stats-overlay">
          <span id="stat-luma">Y:--</span>
          <span id="stat-delta">Δ:--</span>
          <span id="stat-fps">FPS:--</span>
        </div>
      </div>

      <!-- Filter controls -->
      <div id="filter-panel" class="filter-panel">
        <div class="filter-row">
          <label>FILTER</label>
          <select id="filter-select">
            <option value="none">NONE</option>
            <option value="grayscale">GRAYSCALE</option>
            <option value="invert">INVERT</option>
            <option value="edge">EDGE DETECT</option>
            <option value="falsecolor">FALSE COLOR</option>
            <option value="threshold">THRESHOLD</option>
          </select>
        </div>
        <div class="filter-row">
          <label>BRI</label>
          <input type="range" id="sl-brightness" min="-100" max="100" value="0">
          <span id="val-brightness" class="range-val">0</span>
        </div>
        <div class="filter-row">
          <label>CON</label>
          <input type="range" id="sl-contrast" min="-100" max="100" value="0">
          <span id="val-contrast" class="range-val">0</span>
        </div>
      </div>

      <!-- Luminance chart -->
      <canvas id="luma-chart" class="luma-chart" height="60"></canvas>

      <!-- Action buttons -->
      <div class="action-bar">
        <button id="btn-capture" class="btn-action">CAPTURE</button>
        <button id="btn-record" class="btn-action btn-rec">REC 5s</button>
        <button id="btn-analyze" class="btn-action btn-analyze">R ANALYZE</button>
      </div>
    </div>

    <!-- GALLERY TAB -->
    <div class="tab-pane" data-tab="gallery">
      <div id="gallery-grid" class="gallery-grid"></div>
      <div id="lightbox" class="lightbox hidden">
        <img id="lightbox-img">
        <div class="lightbox-controls">
          <button id="lb-prev" class="lb-btn">&lt;</button>
          <span id="lb-name"></span>
          <button id="lb-next" class="lb-btn">&gt;</button>
        </div>
        <button id="lb-close" class="lb-btn lb-close">X</button>
        <button id="lb-delete" class="lb-btn lb-delete">DEL</button>
      </div>
    </div>

    <!-- STATUS TAB -->
    <div class="tab-pane" data-tab="status">
      <pre id="status-readout" class="status-readout">Initializing...<span class="cursor">_</span></pre>
    </div>
  </div>

  <nav id="tab-bar" class="tab-bar">
    <button class="tab active" data-tab="live">LIVE</button>
    <button class="tab" data-tab="gallery">GALLERY</button>
    <button class="tab" data-tab="status">STATUS</button>
  </nav>

  <div class="status-line">
    <span id="ws-status">DISCONNECTED</span>
    <span id="rec-status"></span>
    <span id="frame-counter">0</span>
  </div>
</div>
<script src="/app.js"></script>
</body>
</html>
