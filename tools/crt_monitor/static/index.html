<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhosphorOS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json?v=6">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<title>PhosphorOS</title>
<style>
:root{--bg:#0a0a0a;--g:#00ff41;--gd:#0a6e2a;--gg:rgba(0,255,65,.4);--c:#00ffcc;--r:#ff3333;--b:rgba(0,255,51,.15);--f:"Fira Code","JetBrains Mono","SF Mono",monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--g);font:12px var(--f);overflow:hidden;-webkit-tap-highlight-color:transparent}

/* App shell */
#app{display:flex;flex-direction:column;height:100dvh}
#main{flex:1;overflow:hidden;position:relative}

/* Feed */
.feed{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
.feed img{max-width:100%;max-height:100%;object-fit:contain;image-rendering:auto}
#overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4vw,28px);letter-spacing:.3em;color:var(--g);text-shadow:0 0 16px var(--gg);background:rgba(0,0,0,.6)}
#overlay.off{display:none}

/* Filter bar */
.filters{display:flex;gap:2px;padding:6px;border-top:1px solid var(--b);background:rgba(0,0,0,.8);flex-wrap:wrap;align-items:center}
.filters select,.filters input{background:var(--bg);color:var(--g);border:1px solid var(--b);font:10px var(--f);padding:3px 6px;border-radius:2px}
.filters input[type=range]{width:60px;accent-color:var(--g)}
.filters label{color:var(--gd);font-size:9px;letter-spacing:.1em}
.fv{color:var(--c);font-size:9px;min-width:20px;text-align:center}

/* Gallery */
.gallery{flex:1;overflow-y:auto;padding:6px;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:4px;align-content:start;-webkit-overflow-scrolling:touch}
.gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border:1px solid var(--b);border-radius:2px;cursor:pointer}
.gallery img:active{border-color:var(--g);box-shadow:0 0 8px var(--gg)}
.gallery-empty{grid-column:1/-1;text-align:center;padding:40px;color:var(--gd)}

/* Lightbox */
.lb{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;padding:12px}
.lb.on{display:flex}
.lb img{max-width:100%;max-height:calc(100dvh - 80px);object-fit:contain;touch-action:pinch-zoom}
.lb-bar{display:flex;gap:12px;margin-top:8px;align-items:center}
.lb-bar span{color:var(--c);font-size:10px;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-x{position:absolute;top:8px;right:8px}
.btn{background:transparent;border:1px solid var(--b);color:var(--g);font:12px var(--f);padding:8px 14px;cursor:pointer;border-radius:2px;min-height:40px;letter-spacing:.1em}
.btn:active{background:var(--gd);color:#fff}
.btn.red{color:var(--r);border-color:var(--r)}

/* Tab bar */
nav{display:flex;border-top:1px solid var(--b);background:var(--bg)}
nav button{flex:1;background:transparent;border:none;border-right:1px solid var(--b);color:var(--gd);font:11px var(--f);padding:12px 0;cursor:pointer;letter-spacing:.15em;min-height:44px}
nav button:last-child{border-right:none}
nav button.on{color:var(--g);background:rgba(0,255,65,.06);border-top:2px solid var(--g);text-shadow:0 0 6px var(--gg)}

/* Status bar */
.st{display:flex;justify-content:space-between;padding:0 8px;height:24px;align-items:center;border-top:1px solid var(--b);font-size:9px;color:var(--gd);letter-spacing:.1em;background:rgba(0,255,65,.02)}
.st .ok{color:var(--g)}
.st .err{color:var(--r)}

/* Panels */
.panel{display:none;flex-direction:column;height:100%;overflow:hidden}
.panel.on{display:flex}

/* Status readout */
.readout{flex:1;overflow-y:auto;padding:12px;font-size:11px;line-height:1.8;white-space:pre-wrap;color:var(--g);text-shadow:0 0 4px var(--gg)}

/* Safe area */
@supports(padding:max(0px)){nav{padding-bottom:max(0px,env(safe-area-inset-bottom))}}
@media(min-width:600px){.gallery{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <!-- LIVE -->
    <div class="panel on" id="p-live">
      <div class="feed"><img id="feed" alt="CRT"></div>
      <div id="overlay">NO SIGNAL</div>
      <div class="filters">
        <label>FX</label>
        <select id="fx">
          <option value="none">OFF</option>
          <option value="brightness(1.5)">BRI+</option>
          <option value="brightness(2)">BRI++</option>
          <option value="contrast(1.5)">CON+</option>
          <option value="contrast(2)">CON++</option>
          <option value="grayscale(1)">GRAY</option>
          <option value="invert(1)">INV</option>
          <option value="saturate(2)">SAT+</option>
          <option value="hue-rotate(90deg)">HUE90</option>
          <option value="hue-rotate(180deg)">HUE180</option>
          <option value="brightness(1.5) contrast(1.5)">BRI+CON</option>
        </select>
        <label>BRI</label>
        <input type="range" id="bri" min="50" max="300" value="100">
        <span class="fv" id="bri-v">100</span>
        <label>CON</label>
        <input type="range" id="con" min="50" max="300" value="100">
        <span class="fv" id="con-v">100</span>
      </div>
    </div>
    <!-- GALLERY -->
    <div class="panel" id="p-gallery">
      <div class="gallery" id="gal"></div>
    </div>
    <!-- STATUS -->
    <div class="panel" id="p-status">
      <pre class="readout" id="readout">loading...</pre>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lb" id="lb">
    <img id="lb-img">
    <div class="lb-bar">
      <button class="btn" id="lb-p">&lt;</button>
      <span id="lb-n"></span>
      <button class="btn" id="lb-x">X</button>
      <button class="btn red" id="lb-d">DEL</button>
      <button class="btn" id="lb-nx">&gt;</button>
    </div>
  </div>

  <nav>
    <button class="on" data-p="live">LIVE</button>
    <button data-p="gallery">GALLERY</button>
    <button data-p="status">STATUS</button>
  </nav>
  <div class="st">
    <span id="conn">--</span>
    <span>PHOSPHOR<small>OS</small></span>
    <span id="fc">0</span>
  </div>
</div>

<script>
(function(){
  var feed=document.getElementById('feed'),ov=document.getElementById('overlay');
  var conn=document.getElementById('conn'),fc=document.getElementById('fc');
  var fx=document.getElementById('fx'),bri=document.getElementById('bri'),con=document.getElementById('con');
  var briV=document.getElementById('bri-v'),conV=document.getElementById('con-v');
  var gal=document.getElementById('gal');
  var lb=document.getElementById('lb'),lbImg=document.getElementById('lb-img'),lbN=document.getElementById('lb-n');
  var readout=document.getElementById('readout');
  var frames=0,items=[],lbIdx=0,activeTab='live',statusTmr=null;

  /* ── Tabs ──────────────────────────────────── */
  document.querySelectorAll('nav button').forEach(function(b){
    b.addEventListener('click',function(){
      var t=b.dataset.p;
      document.querySelectorAll('nav button').forEach(function(x){x.classList.remove('on')});
      document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('on')});
      b.classList.add('on');
      document.getElementById('p-'+t).classList.add('on');
      activeTab=t;
      if(t==='gallery')loadGallery();
      if(t==='status'){loadStatus();statusTmr=setInterval(function(){if(activeTab==='status')loadStatus()},5000)}
      else{clearInterval(statusTmr)}
    });
  });

  /* ── Live feed (fetch + blob, works on ALL browsers) ── */
  var polling=false;
  function startFeed(){
    if(polling)return;polling=true;
    conn.textContent='LIVE';conn.className='ok';
    ov.classList.add('off');
    (function poll(){
      fetch('/api/snapshot?ts='+Date.now(),{cache:'no-store'})
        .then(function(r){if(!r.ok)throw r;return r.blob()})
        .then(function(b){
          var u=URL.createObjectURL(b);
          feed.onload=function(){URL.revokeObjectURL(u);frames++;fc.textContent=frames;setTimeout(poll,300)};
          feed.onerror=function(){URL.revokeObjectURL(u);setTimeout(poll,1000)};
          feed.src=u;
        })
        .catch(function(){conn.textContent='RETRY';conn.className='err';setTimeout(poll,2000)});
    })();
  }

  /* ── CSS Filters ───────────────────────────── */
  fx.addEventListener('change',applyFilter);
  bri.addEventListener('input',function(){briV.textContent=bri.value;applyFilter()});
  con.addEventListener('input',function(){conV.textContent=con.value;applyFilter()});
  function applyFilter(){
    var f=[];
    if(fx.value!=='none')f.push(fx.value);
    if(bri.value!=='100')f.push('brightness('+bri.value/100+')');
    if(con.value!=='100')f.push('contrast('+con.value/100+')');
    feed.style.filter=f.length?f.join(' '):'none';
  }

  /* ── Gallery ───────────────────────────────── */
  function loadGallery(){
    fetch('/api/gallery?ts='+Date.now(),{cache:'no-store'}).then(function(r){return r.json()}).then(function(d){
      d.sort(function(a,b){return b.mtime-a.mtime});
      items=d;renderGal();
    }).catch(function(){gal.innerHTML='<p class="gallery-empty">ERROR</p>'});
  }
  function renderGal(){
    gal.innerHTML='';
    if(!items.length){gal.innerHTML='<p class="gallery-empty">NO CAPTURES</p>';return}
    items.forEach(function(it,i){
      var img=document.createElement('img');
      img.src='/captures/'+it.file+'?v='+(it.mtime||0);img.alt=it.file;img.loading='lazy';
      img.addEventListener('click',function(){openLb(i)});
      gal.appendChild(img);
    });
  }

  /* ── Lightbox ──────────────────────────────── */
  function openLb(i){lbIdx=i;updLb();lb.classList.add('on')}
  function closeLb(){lb.classList.remove('on')}
  function updLb(){lbImg.src='/captures/'+items[lbIdx].file+'?v='+(items[lbIdx].mtime||0);lbN.textContent=items[lbIdx].file}
  document.getElementById('lb-p').addEventListener('click',function(){if(lbIdx>0){lbIdx--;updLb()}});
  document.getElementById('lb-nx').addEventListener('click',function(){if(lbIdx<items.length-1){lbIdx++;updLb()}});
  document.getElementById('lb-x').addEventListener('click',closeLb);
  lb.addEventListener('click',function(e){if(e.target===lb)closeLb()});
  document.getElementById('lb-d').addEventListener('click',function(){
    fetch('/api/gallery/'+encodeURIComponent(items[lbIdx].file),{method:'DELETE'})
      .then(function(r){return r.json()}).then(function(d){if(d.ok){closeLb();loadGallery()}});
  });
  document.addEventListener('keydown',function(e){
    if(!lb.classList.contains('on'))return;
    if(e.key==='ArrowLeft'&&lbIdx>0){lbIdx--;updLb()}
    if(e.key==='ArrowRight'&&lbIdx<items.length-1){lbIdx++;updLb()}
    if(e.key==='Escape')closeLb();
  });
  /* Swipe */
  var tx=0;
  lbImg.addEventListener('touchstart',function(e){tx=e.changedTouches[0].clientX},{passive:true});
  lbImg.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)<50)return;
    if(dx<0&&lbIdx<items.length-1){lbIdx++;updLb()}
    if(dx>0&&lbIdx>0){lbIdx--;updLb()}
  },{passive:true});

  /* ── Status ────────────────────────────────── */
  function loadStatus(){
    fetch('/api/status?ts='+Date.now(),{cache:'no-store'}).then(function(r){return r.json()}).then(function(d){
      var s='';
      s+='  VIDEO:    '+(d.video_standard||'N/A')+'\n';
      s+='  COLOR:    '+(d.color_enabled?'ON':'OFF')+'\n';
      s+='  LINES:    '+(d.active_lines||0)+'\n';
      s+='  SAMPLE:   '+fmtHz(d.sample_rate_hz||0)+'\n';
      s+='  DEVICE:   '+(d.capture_device||'N/A')+'\n';
      s+='  CAPTURE:  '+(d.capture_resolution||'N/A')+'\n';
      s+='  UPTIME:   '+fmtUp(d.uptime_s||0)+'\n';
      readout.textContent=s+'\n> READY_';
    }).catch(function(e){readout.textContent='ERROR: '+e.message});
  }
  function fmtHz(h){return h>=1e6?(h/1e6).toFixed(3)+' MHz':h>=1e3?(h/1e3).toFixed(1)+' kHz':h+' Hz'}
  function fmtUp(s){s=Math.floor(s);return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m '+(s%60)+'s'}

  /* ── Boot ──────────────────────────────────── */
  startFeed();
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
            (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  if('serviceWorker' in navigator){
    if(isIOS){
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){r.unregister()});
      });
    }else{
      navigator.serviceWorker.register('/sw.js');
    }
  }
})();
</script>
</body>
</html>
