<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRT Live">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json?v=6">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<title>CRT Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;height:100dvh;font-family:"Fira Code","JetBrains Mono",monospace;color:#00ff41;overflow:hidden}
#feed{flex:1;width:100%;object-fit:contain;display:block;image-rendering:pixelated;background:#000}
.bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:11px;letter-spacing:.1em;background:rgba(0,255,65,.03);border-top:1px solid rgba(0,255,65,.15)}
.bar span{text-shadow:0 0 6px rgba(0,255,65,.4)}
a{color:#00ffcc;text-decoration:none;text-shadow:0 0 4px rgba(0,255,204,.3)}
a:active{color:#fff}
#status{color:#555;font-size:9px;text-align:center;padding:3px;letter-spacing:.15em}
/* Safe area for iPhone notch */
@supports(padding:max(0px)){
  .bar{padding-bottom:max(8px,env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<img id="feed" src="/stream" alt="CRT Live">
<div id="status">connecting...</div>
<div class="bar">
  <span>PHOSPHOR<small>OS</small></span>
  <span><a href="/api/snapshot">SNAP</a> · <a href="/">DASH</a> · <a href="/api/gallery">DATA</a></span>
</div>
<script>
(function(){
  var feed=document.getElementById('feed'),st=document.getElementById('status');
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
            (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

  function startPolling(){
    st.textContent='polling';st.style.color='#00ffcc';
    feed.onerror=null;feed.onload=null;
    (function poll(){
      fetch('/api/snapshot?ts='+Date.now(),{cache:'no-store'})
        .then(function(r){if(!r.ok)throw r;return r.blob()})
        .then(function(b){
          var u=URL.createObjectURL(b);
          feed.onload=function(){URL.revokeObjectURL(u);setTimeout(poll,300)};
          feed.onerror=function(){URL.revokeObjectURL(u);setTimeout(poll,1000)};
          feed.src=u;
        })
        .catch(function(){setTimeout(poll,2000)});
    })();
  }

  if(isIOS){
    /* iOS Safari: MJPEG bugado, vai direto pra polling */
    st.textContent='iOS detected';
    startPolling();
  }else{
    /* Outros: tenta MJPEG, fallback pra polling */
    var ok=false;
    feed.src='/stream';
    feed.onload=function(){if(!ok){ok=true;st.textContent='stream';st.style.color='#00ff41'}};
    feed.onerror=function(){startPolling()};
    setTimeout(function(){if(!ok)startPolling()},4000);
  }

  if('serviceWorker' in navigator){
    if(isIOS){
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){r.unregister()});
      });
    }else{
      navigator.serviceWorker.register('/sw.js');
    }
  }
})();
</script>
</body>
</html>
